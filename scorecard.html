<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NEET UG Scorecard</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#f2f2f2;
    font-family:Arial, sans-serif;
}

.header{
    background:#ffffff;
    padding:15px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    box-shadow:0 2px 8px rgba(0,0,0,.15);
}

.header h2{
    color:#003366;
}

    background:#0d6efd;
    color:#fff;
    text-decoration:none;
    padding:10px 18px;
    border-radius:5px;

}

.download-btn:hover{

}

.container{
    width:100%;
    text-align:center;
    padding:20px;
}

.container img{
    width:100%;
    max-width:900px;
    border:1px solid #ccc;

}

</head>

<body>

<div class="header">

<h2>NEET UG 2026 Score Card</h2>

<a
href="./scorecard.jpg"
download="NEET-UG-Scorecard.jpg"
class="download-btn">

Download Scorecard

</a>

</div>

<div class="container">

<img
src="./scorecard.jpg"
alt="Scorecard">

</div>

<script>

if(sessionStorage.getItem("portalLoggedIn") !== "true"){
    window.location.href = "index.html";
}

</script>
